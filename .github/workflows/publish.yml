name: Publish to PyPI and GHCR

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test & lint before publish
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
      contents: write  # required to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Assert tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="v$(uv run python -c 'import tomllib; d=tomllib.load(open("pyproject.toml","rb")); print(d["project"]["version"])')"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $TAG does not match pyproject.toml version $VERSION" >&2
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --title "${{ github.ref_name }}" --generate-notes

  docker:
    name: Build and push Docker image to GHCR
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Wait for phylotypes==${{ steps.version.outputs.version }} on PyPI
        run: |
          for i in $(seq 1 20); do
            pip index versions phylotypes 2>/dev/null | grep -qF "${{ steps.version.outputs.version }}" && exit 0
            echo "Attempt $i: not yet on PyPI, waiting 30s..."
            sleep 30
          done
          echo "Timed out waiting for PyPI propagation" && exit 1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: PHYLOTYPES_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
