# Pre-commit configuration for mypy and ruff with Google style Python defaults
# Install with: pre-commit install
# Run on all files with: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first

  # Ruff linting and formatting (Google style) - using Poetry
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: poetry run ruff format
        language: system
        types: [python]

  # MyPy type checking (Google style) - using Poetry
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        types: [python]
        args: [
          "--ignore-missing-imports",
          "--show-error-codes",
          "--strict",
        ]
        files: "^src/"

# Configuration settings
default_install_hook_types: ["pre-commit"]
fail_fast: false
minimum_pre_commit_version: "4.3.0"
